const ymd = (d) => {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
};
const parseYMD = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const todayKey = () => ymd(new Date());

const computeStreak = (log) => {
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const dow = d.getDay();
    const key = ymd(d);
    if (dow === 0 || dow === 6) { d.setDate(d.getDate()-1); continue; }
    const entry = log[key];
    const hasData = entry && entry.sets && entry.sets.some((s) => s.weight || s.reps);
    if (hasData) { streak++; d.setDate(d.getDate()-1); }
    else { if (i === 0) { d.setDate(d.getDate()-1); continue; } break; }
  }
  return streak;
};

function App() {
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [log, setLog] = useState({});
  const [logLoading, setLogLoading] = useState(false);
  const [view, setView] = useState('today');
  const [selectedDate, setSelectedDate] = useState(todayKey());
  const [detail, setDetail] = useState(null);
  const [saveStatus, setSaveStatus] = useState(''); // '' | 'saving' | 'saved' | 'error'

  useEffect(() => {
    const unsub = onAuthStateChanged(auth, (u) => {
      setUser(u);
      setAuthLoading(false);
    });
    return unsub;
  }, []);

  useEffect(() => {
    if (!user) { setLog({}); return; }
    setLogLoading(true);
    (async () => {
      try {
        const snap = await getDocs(collection(db, 'users', user.uid, 'sessions'));
        const data = {};
        snap.forEach((d) => { data[d.id] = d.data(); });
        setLog(data);
      } catch (e) {
        console.error('load failed', e);
      } finally {
        setLogLoading(false);
      }
    })();
  }, [user]);

  const updateEntry = async (dateKey, partial) => {
    setLog((prev) => ({ ...prev, [dateKey]: { ...(prev[dateKey] || {}), ...partial } }));
    if (!user) return;
    setSaveStatus('saving');
    try {
      const merged = { ...(log[dateKey] || {}), ...partial };
      await setDoc(doc(db, 'users', user.uid, 'sessions', dateKey), merged);
      setSaveStatus('saved');
      setTimeout(() => setSaveStatus(''), 1500);
    } catch (e) {
      console.error('save failed', e);
      setSaveStatus('error');
    }
  };

  const handleLogin = async () => {
    try {
      await signInWithPopup(auth, new GoogleAuthProvider());
    } catch (e) {
      console.error('login failed', e);
      alert('ログインに失敗しました: ' + e.message);
    }
  };
  const handleLogout = async () => { await signOut(auth); };

  const streak = useMemo(() => computeStreak(log), [log]);

  if (authLoading) return e('div', { style: styles.center }, e('div', { style: { color: '#666', fontSize: 13 } }, '読み込み中…'));
  if (!user) return e(LoginScreen, { onLogin: handleLogin });
  if (logLoading) return e('div', { style: styles.center }, e('div', { style: { color: '#666', fontSize: 13 } }, 'データを読み込み中…'));

  return e('div', null,
    e(Header, { view, setView, streak, log, user, onLogout: handleLogout, saveStatus }),
    e('main', { style: styles.main },
      view === 'today' && e(TodayView, { selectedDate, setSelectedDate, log, updateEntry }),
      view === 'heatmap' && e(HeatmapView, { log, onSelectDay: setDetail }),
      view === 'progress' && e(ProgressView, { log })
    ),
    detail && e(DayModal, { dateKey: detail, log, onClose: () => setDetail(null) })
  );
}

function Header({ view, setView, streak, log, user, onLogout, saveStatus }) {
  const exportCSV = () => {
    const rows = [['date','part','exercise','set','weight_kg','reps','rpe','note']];
    Object.keys(log).sort().forEach((date) => {
      const entry = log[date];
      if (!entry || !entry.sets) return;
      entry.sets.forEach((s, i) => {
        rows.push([date, entry.part || '', s.exercise || '', s.setIndex ?? i+1, s.weight ?? '', s.reps ?? '', s.rpe ?? '', (entry.note || '').replace(/\n/g,' ')]);

    const csv = rows.map((r) => r.map((c) => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');

    a.href = url; a.download = `tanrenroku_${todayKey()}.csv`; a.click();

  return e('header', { style: styles.header },

      e('div', { style: styles.brandSeal }, '鍛'),

        e('div', { style: styles.brandSub }, 'TANREN-ROKU')

// ===== インターバルタイマー =====
let audioCtx = null;
const ensureAudio = () => {
  if (!audioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (Ctx) audioCtx = new Ctx();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
};

const playWhistle = (pattern = 'single') => {
  const ctx = ensureAudio();
  if (!ctx) return;
  const beeps = pattern === 'double' ? [[0, 0.18], [0.28, 0.18]]
                : pattern === 'long' ? [[0, 0.5]]
                : [[0, 0.2]];
  beeps.forEach(([offset, dur]) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1760, ctx.currentTime + offset); // A6
    gain.gain.setValueAtTime(0, ctx.currentTime + offset);
    gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + offset + 0.01);
    gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + offset + dur - 0.05);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + offset + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(ctx.currentTime + offset);
    osc.stop(ctx.currentTime + offset + dur);
  });
};

const TIMER_SETTINGS_KEY = 'timer-settings-v1';
const loadTimerSettings = () => {
  try {
    const raw = localStorage.getItem(TIMER_SETTINGS_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { setSec: 60, restSec: 180 };
};
const saveTimerSettings = (s) => {
  try { localStorage.setItem(TIMER_SETTINGS_KEY, JSON.stringify(s)); } catch {}
};

function IntervalTimer() {
  const [settings, setSettings] = useState(loadTimerSettings);
  const [phase, setPhase] = useState('idle'); // 'idle' | 'set' | 'rest'
  const [remaining, setRemaining] = useState(0);
  const [setCount, setSetCount] = useState(0);
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => { saveTimerSettings(settings); }, [settings]);

  // メインのカウントダウンループ
  useEffect(() => {
    if (phase === 'idle') return;
    const interval = setInterval(() => {
      setRemaining((prev) => {
        const next = prev - 1;
        // インターバル30秒前
        if (phase === 'rest' && next === 30) {
          playWhistle('single');
        }
        if (next <= 0) {
          // フェーズ移行
          if (phase === 'set') {
            playWhistle('long'); // セット終了 = インターバル開始
            setPhase('rest');
            return settings.restSec;
          } else {
            playWhistle('double'); // インターバル終了 = 次セット開始
            setSetCount((c) => c + 1);
            setPhase('set');
            return settings.setSec;
          }
        }
        return next;
      });
    }, 1000);
    return () => clearInterval(interval);
  }, [phase, settings.setSec, settings.restSec]);

  const handleStart = () => {
    ensureAudio();
    playWhistle('double'); // 開始の合図
    setPhase('set');
    setRemaining(settings.setSec);
    setSetCount(1);
  };
  const handleStop = () => {
    setPhase('idle');
    setRemaining(0);
    setSetCount(0);
  };
  const handleSkip = () => {
    if (phase === 'set') { playWhistle('long'); setPhase('rest'); setRemaining(settings.restSec); }
    else if (phase === 'rest') { playWhistle('double'); setSetCount((c) => c + 1); setPhase('set'); setRemaining(settings.setSec); }
  };

  const fmt = (sec) => {
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  };

  const phaseColor = phase === 'set' ? '#c0392b' : phase === 'rest' ? '#3d7a4f' : '#3a3a3a';
  const phaseLabel = phase === 'set' ? `SET ${setCount}` : phase === 'rest' ? 'REST' : 'TIMER';
  const phaseSub = phase === 'set' ? 'トレーニング中' : phase === 'rest' ? 'インターバル' : '待機中';

  return e('div', { style: { ...styles.timerWrap, borderColor: phaseColor } },
    e('div', { style: styles.timerHeader },
      e('div', null,
        e('div', { style: { ...styles.timerPhaseLabel, color: phaseColor } }, phaseLabel),
        e('div', { style: styles.timerPhaseSub }, phaseSub)
      ),
      e('button', { onClick: () => setShowSettings(!showSettings), style: styles.timerGearBtn }, showSettings ? '×' : '⚙')
    ),
    showSettings
      ? e('div', { style: styles.timerSettings },
          e('div', { style: styles.timerSettingRow },
            e('label', { style: styles.timerSettingLabel }, 'セット時間（秒）'),
            e('input', {
              type: 'number', min: 5, max: 600, step: 5,
              value: settings.setSec,
              onChange: (ev) => setSettings({ ...settings, setSec: Math.max(5, parseInt(ev.target.value) || 60) }),
              disabled: phase !== 'idle',
              style: styles.timerSettingInput
            })
          ),
          e('div', { style: styles.timerSettingRow },
            e('label', { style: styles.timerSettingLabel }, 'インターバル（秒）'),
            e('input', {
              type: 'number', min: 5, max: 600, step: 5,
              value: settings.restSec,
              onChange: (ev) => setSettings({ ...settings, restSec: Math.max(5, parseInt(ev.target.value) || 180) }),
              disabled: phase !== 'idle',
              style: styles.timerSettingInput
            })
          ),
          phase !== 'idle' && e('div', { style: styles.timerSettingNote }, '※ 動作中は変更できません')
        )
      : e(React.Fragment, null,
          e('div', { style: { ...styles.timerDisplay, color: phase === 'idle' ? '#666' : '#f4f0e6' } },
            phase === 'idle' ? `${fmt(settings.setSec)} / ${fmt(settings.restSec)}` : fmt(remaining)
          ),
          e('div', { style: styles.timerControls },
            phase === 'idle'
              ? e('button', { onClick: handleStart, style: { ...styles.timerBtn, ...styles.timerBtnPrimary } }, '▶ スタート')
              : e(React.Fragment, null,
                  e('button', { onClick: handleSkip, style: styles.timerBtn }, '⏭ スキップ'),
                  e('button', { onClick: handleStop, style: { ...styles.timerBtn, ...styles.timerBtnDanger } }, '■ 停止')
                )
          )
        )
  );
}

function TodayView({ selectedDate, setSelectedDate, log, updateEntry }) {
  const date = parseYMD(selectedDate);
  const dow = date.getDay();
  const isRest = dow === 0 || dow === 6;
  const partKey = DAY_TO_PART[dow];
  const part = partKey ? PARTS[partKey] : null;
  const exercises = partKey ? MENU[partKey] : [];
  const entry = log[selectedDate] || { part: partKey, sets: [], note: '' };

  const setsByEx = useMemo(() => {
    const map = {};
    exercises.forEach((ex) => (map[ex.name] = []));
    (entry.sets || []).forEach((s) => {
      if (!map[s.exercise]) map[s.exercise] = [];
      map[s.exercise].push(s);
    });
    return map;
  }, [entry.sets, exercises]);

  const lastSession = useMemo(() => {
    const dates = Object.keys(log).filter((k) => k < selectedDate && log[k]?.part === partKey && log[k]?.sets?.length).sort().reverse();
    return dates[0] ? { date: dates[0], data: log[dates[0]] } : null;
  }, [log, selectedDate, partKey]);

  const updateSet = (exercise, setIdx, field, value) => {
    const sets = [...(entry.sets || [])];
    let target = sets.findIndex((s) => s.exercise === exercise && s.setIndex === setIdx);
    if (target === -1) { sets.push({ exercise, setIndex: setIdx, weight: '', reps: '', rpe: '' }); target = sets.length - 1; }
    sets[target] = { ...sets[target], [field]: value };
    updateEntry(selectedDate, { part: partKey, sets, note: entry.note || '' });
  };

  const navDate = (delta) => { const d = parseYMD(selectedDate); d.setDate(d.getDate() + delta); setSelectedDate(ymd(d)); };

  return e('div', { style: styles.todayWrap },
    e('div', { style: styles.dateBar },
      e('button', { onClick: () => navDate(-1), style: styles.iconBtn }, '‹'),
      e('div', { style: styles.dateLabel },
        e('div', { style: styles.dateMain }, selectedDate.replace(/-/g, '.')),
        e('div', { style: styles.dateSub }, `${DAY_LABELS[dow]}曜日 ${part ? '· ' + part.jp : '· 休息日'}`)
      ),
      e('button', { onClick: () => navDate(1), style: styles.iconBtn }, '›')
    ),
    isRest
      ? e('div', { style: styles.restCard },
          e('div', { style: styles.restMark }, '休'),
          e('div', { style: styles.restText }, '本日は休息日です'),
          e('div', { style: styles.restSub }, '回復もトレーニングのうち')
        )
      : e(React.Fragment, null,
          e(IntervalTimer, null),
          e('div', { style: { ...styles.partBanner, borderLeftColor: part.color } },
            e('div', { style: { ...styles.partKanji, color: part.color } }, part.jp),
            e('div', null,
              e('div', { style: styles.partName }, part.name.toUpperCase() + ' DAY'),
              e('div', { style: styles.partExCount }, exercises.length + ' 種目')
            )
          ),
          ...exercises.map((ex) =>
            e(ExerciseBlock, { key: ex.name, exercise: ex, sets: setsByEx[ex.name] || [], partColor: part.color, lastSession, onUpdate: (setIdx, field, value) => updateSet(ex.name, setIdx, field, value) })
          ),
          e('div', { style: styles.noteBlock },
            e('div', { style: styles.noteLabel }, '所見・覚書'),
            e('textarea', {
              style: styles.noteTextarea,
              value: entry.note || '',
              onChange: (ev) => updateEntry(selectedDate, { part: partKey, sets: entry.sets || [], note: ev.target.value }),
              placeholder: '体調、フォームの気づき、次回の課題など'
            })
          )
        )
  );
}

function ExerciseBlock({ exercise, sets, partColor, lastSession, onUpdate }) {
  const lastSets = lastSession?.data?.sets?.filter((s) => s.exercise === exercise.name) || [];
  const lastBest = lastSets.reduce((max, s) => { const w = parseFloat(s.weight); return !isNaN(w) && w > max ? w : max; }, 0);

  return e('div', { style: styles.exBlock },
    e('div', { style: styles.exHeader },
      e('div', null,
        e('div', { style: styles.exName }, exercise.name),
        e('div', { style: styles.exTarget }, `目標 · ${exercise.sets} sets × ${exercise.reps} reps`)
      ),
      lastBest > 0 && e('div', { style: styles.lastBest },
        e('div', { style: styles.lastBestLabel }, '前回最重量'),
        e('div', { style: { ...styles.lastBestVal, color: partColor } }, lastBest, e('span', { style: styles.lastBestUnit }, 'kg'))
      )
    ),
    e('div', { style: styles.setHeaderRow },
      e('div', { style: styles.setHeaderCell }, 'SET'),
      e('div', { style: styles.setHeaderCell }, '重量(kg)'),
      e('div', { style: styles.setHeaderCell }, '回数'),
      e('div', { style: styles.setHeaderCell }, 'RPE')
    ),
    ...Array.from({ length: exercise.sets }, (_, i) => {
      const setIdx = i + 1;

function YearStats({ log, year }) {
  const stats = useMemo(() => {
    const counts = { chest:0, back:0, legs:0, shoulder:0, arms:0 };
    let totalSets = 0, totalVolume = 0;
    Object.keys(log).forEach((k) => {
      if (!k.startsWith(`${year}-`)) return;
      const ent = log[k]; if (!ent?.sets?.length) return;
      const hasData = ent.sets.some((s) => s.weight || s.reps); if (!hasData) return;
      if (ent.part && counts[ent.part] !== undefined) counts[ent.part]++;
      ent.sets.forEach((s) => { const w = parseFloat(s.weight), r = parseFloat(s.reps); if (!isNaN(w) && !isNaN(r)) { totalSets++; totalVolume += w*r; } });
    });
    const totalDays = Object.values(counts).reduce((a,b) => a+b, 0);
    return { counts, totalDays, totalSets, totalVolume };
  }, [log, year]);

  const stat = (label, value, unit) => e('div', { style: styles.statBlock },
    e('div', { style: styles.statLabel }, label),
    e('div', { style: styles.statValRow }, e('span', { style: styles.statVal }, value), e('span', { style: styles.statUnit }, unit))
  );

  return e('div', { style: styles.yearStats },
    stat('トレーニング日数', stats.totalDays, '日'),
    stat('総セット数', stats.totalSets, 'set'),
    stat('総ボリューム', (stats.totalVolume/1000).toFixed(1), 't'),
    e('div', { style: styles.partBreakdown },
      ...Object.entries(PARTS).map(([k,p]) =>
        e('div', { key: k, style: styles.breakItem },
          e('span', { style: { ...styles.breakDot, background: p.color } }),
          e('span', { style: styles.breakLabel }, p.jp),
          e('span', { style: styles.breakVal }, stats.counts[k])
        )
      )
    )
  );
}

function buildYearGrid(year) {
  const start = new Date(year, 0, 1);
  const end = new Date(year, 11, 31);
  const firstMonday = new Date(start);
  const startDow = start.getDay();
  const offset = startDow === 0 ? -6 : 1 - startDow;
  firstMonday.setDate(firstMonday.getDate() + offset);
  const weeks = [], monthLabels = [];
  let lastMonth = -1, cursor = new Date(firstMonday), weekIdx = 0;
  while (cursor <= end || cursor.getFullYear() === year) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(cursor);
      if (d.getFullYear() === year) {
        week.push({ date: d, key: ymd(d), dow: d.getDay() });
        if (i === 0 && d.getMonth() !== lastMonth) {
          monthLabels.push({ col: weekIdx, label: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'][d.getMonth()] });
          lastMonth = d.getMonth();
        }
      } else { week.push(null); }
      cursor.setDate(cursor.getDate() + 1);
    }
    weeks.push(week); weekIdx++;
    if (cursor.getFullYear() > year) break;
    if (weekIdx > 54) break;
  }
  return { weeks, monthLabels };
}

function ProgressView({ log }) {
  const allExercises = useMemo(() => {
    const set = new Set();
    Object.values(log).forEach((entry) => { entry?.sets?.forEach((s) => s.exercise && set.add(s.exercise)); });
    return Array.from(set);
  }, [log]);
  const [selected, setSelected] = useState('');
  useEffect(() => { if (!selected && allExercises.length) setSelected(allExercises[0]); }, [allExercises, selected]);

  const data = useMemo(() => {
    if (!selected) return [];
    const points = [];
    Object.keys(log).sort().forEach((date) => {
      const entry = log[date];
      const exSets = entry?.sets?.filter((s) => s.exercise === selected) || [];
      const validSets = exSets.filter((s) => parseFloat(s.weight) > 0 && parseFloat(s.reps) > 0);
      if (!validSets.length) return;
      const maxW = Math.max(...validSets.map((s) => parseFloat(s.weight)));
      const volume = validSets.reduce((sum, s) => sum + parseFloat(s.weight) * parseFloat(s.reps), 0);
      points.push({ date: date.slice(5), max: maxW, volume });
    });
    return points;
  }, [log, selected]);

  const partKey = useMemo(() => {
    for (const [pk, exes] of Object.entries(MENU)) { if (exes.some((ex) => ex.name === selected)) return pk; }
    return null;
  }, [selected]);
  const color = partKey ? PARTS[partKey].color : '#888';

  if (!allExercises.length) return e('div', { style: styles.emptyProgress },
    e('div', { style: styles.emptyText }, '記録がまだありません'),
    e('div', { style: styles.emptySub }, '「本日」タブから記録を始めると、ここに推移が表示されます')
  );

  return e('div', { style: styles.progressWrap },
    e('div', null,
      e('div', { style: styles.exSelectLabel }, '種目'),
      e('select', { value: selected, onChange: (ev) => setSelected(ev.target.value), style: styles.exSelectInput },
        ...allExercises.map((ex) => e('option', { key: ex, value: ex }, ex))
      )
    ),
    data.length
      ? e(React.Fragment, null,
          e(SimpleLineChart, { title: '最大重量の推移', data, field: 'max', color }),
          e(SimpleLineChart, { title: '総ボリューム', data, field: 'volume', color, dashed: true })
        )
      : e('div', { style: styles.emptyProgress }, e('div', { style: styles.emptyText }, 'この種目の記録はまだありません'))
  );
}

function SimpleLineChart({ title, data, field, color, dashed }) {
  const W = 600, H = 200, P = 36;
  const values = data.map((d) => d[field]);
  const maxV = Math.max(...values, 1);
  const minV = Math.min(...values, 0);
  const range = maxV - minV || 1;
  const points = data.map((d, i) => {
    const x = data.length > 1 ? P + (i / (data.length - 1)) * (W - 2*P) : W/2;
    const y = H - P - ((d[field] - minV) / range) * (H - 2*P);
    return { x, y, raw: d };
  });
  const path = points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ');

  return e('div', { style: styles.chartCard },
    e('div', { style: styles.chartLabel }, title),
    e('svg', { viewBox: `0 0 ${W} ${H}`, style: { width: '100%', height: 'auto' } },
      e('line', { x1: P, y1: H-P, x2: W-P, y2: H-P, stroke: '#2a2a2a', strokeWidth: '0.5' }),
      e('line', { x1: P, y1: P, x2: P, y2: H-P, stroke: '#2a2a2a', strokeWidth: '0.5' }),
      e('text', { x: P-6, y: P+4, fontSize: '11', fill: '#666', fontFamily: 'monospace', textAnchor: 'end' }, Math.round(maxV)),
      e('text', { x: P-6, y: H-P+3, fontSize: '11', fill: '#666', fontFamily: 'monospace', textAnchor: 'end' }, Math.round(minV)),
      e('path', { d: path, fill: 'none', stroke: color, strokeWidth: '2', strokeDasharray: dashed ? '4 3' : '0' }),
      ...points.map((p, i) => e('circle', { key: i, cx: p.x, cy: p.y, r: '3', fill: color })),
      ...(points.length <= 14 ? points.map((p, i) =>
        e('text', { key: 'l'+i, x: p.x, y: H-P+16, fontSize: '10', fill: '#666', fontFamily: 'monospace', textAnchor: 'middle' }, p.raw.date)
      ) : [])
    )
  );
}
